<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Open Mike Twitch Rewards Marketplace</title>
  <style>
    :root {
      --bg: #0f0f14;
      --card: #1a1a23;
      --text: #f5f5f7;
      --muted: #b8b8c7;
      --accent: #9146ff;
      --border: #2a2a36;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(145, 70, 255, 0.28), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(80, 200, 255, 0.18), transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(255, 90, 180, 0.12), transparent 30%),
        #0f0f14;
      background-size: 140% 140%;
      animation: backgroundShift 16s ease-in-out infinite alternate;
      color: var(--text);
      min-height: 100vh;
    }

    @keyframes backgroundShift {
      0% {
        background-position: 0% 0%;
      }

      100% {
        background-position: 100% 100%;
      }
    }

    header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 20px 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 4rem);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
    }

    .toolbar {
      max-width: 1400px;
      margin: 0 auto 24px;
      padding: 0 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input, select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
    }

    input {
      flex: 1;
      min-width: 220px;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(26, 26, 35, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card img {
      width: 100%;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      display: block;
      background: #222;
        transition: transform 0.25s ease;
    }

.card:hover {
  transform: translateY(-6px);
  border-color: var(--accent);
  box-shadow:
    0 26px 60px rgba(0,0,0,0.35),
    0 0 24px rgba(145, 70, 255, 0.25);
}

.card:hover img {
  transform: scale(1.04);
}

.card:hover .command-box {
  border-color: var(--accent);
}    

    .card-body {
      padding: 18px;
    }

.name-row {
  margin-bottom: 6px;
}

    h2 {
      margin: 0;
      font-size: 1.2rem;
    }

.cost {
  display: inline-block;
  color: var(--accent);
  font-weight: 800;
  margin-bottom: 12px;
}

    .description {
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 16px;
    }

    .command-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .command-box {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: #101018;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  color: #fff;
  cursor: pointer;
  font: inherit;
  text-align: left;
}

.command-box code {
  background: transparent;
  border: 0;
  padding: 0;
  color: #fff;
  overflow-wrap: anywhere;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.copy-icon {
  flex: 0 0 auto;
  color: var(--muted);
  font-size: 1rem;
}

.command-box:hover {
  border-color: var(--accent);
}

.command-box.copied {
  border-color: var(--accent);
}

    code {
      display: block;
      background: #101018;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      color: #fff;
      overflow-wrap: anywhere;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }
  </style>
</head>
<body>
  <header>
    <img src="images/LOGO-lom-initials-new.png" width="600" height="150"></img
    <h1>Live Open Mike Pixel Rewards</h1>
    <p class="subtitle">Spend your pixels by typing the 'buy' command in Twitch chat.</p>
  </header>

  <section class="toolbar">
    <input id="search" type="search" placeholder="Search rewards..." />
    <select id="sort">
      <option value="name">Sort by name</option>
      <option value="cost-low">Cost: low to high</option>
      <option value="cost-high">Cost: high to low</option>
    </select>
  </section>

  <main id="rewards"></main>

  <script>
    const rewardsEl = document.querySelector("#rewards");
    const searchEl = document.querySelector("#search");
    const sortEl = document.querySelector("#sort");

    let rewards = [];

    async function loadRewards() {
      const response = await fetch("rewards.json");
      rewards = await response.json();
      renderRewards();
    }

    function renderRewards() {
      const query = searchEl.value.toLowerCase().trim();
      const sort = sortEl.value;

      let visibleRewards = rewards.filter((reward) => {
        return (
          reward.name.toLowerCase().includes(query) ||
          reward.description.toLowerCase().includes(query) ||
          reward.command.toLowerCase().includes(query)
        );
      });

      visibleRewards.sort((a, b) => {
        if (sort === "cost-low") return a.cost - b.cost;
        if (sort === "cost-high") return b.cost - a.cost;
        return a.name.localeCompare(b.name);
      });

      if (visibleRewards.length === 0) {
        rewardsEl.innerHTML = `<div class="empty">No rewards found.</div>`;
        return;
      }

      rewardsEl.innerHTML = visibleRewards.map((reward) => `
        <article class="card">
          <img src="${reward.thumbnail}" alt="${reward.name}">
          <div class="card-body">
<div class="name-row">
  <h2>${reward.name}</h2>
</div>
<div class="cost">${reward.cost.toLocaleString()} pts</div>
<p class="description">${reward.description}</p>
<div class="command-label">Click to copy chat command:</div>
<button class="command-box" type="button" data-command="${reward.command}">
  <code>${reward.command}</code>
  <span class="copy-icon" aria-hidden="true">📋</span>
</button>
          </div>
        </article>
      `).join("");
    }

    searchEl.addEventListener("input", renderRewards);
    sortEl.addEventListener("change", renderRewards);

    rewardsEl.addEventListener("click", async (event) => {
  const button = event.target.closest(".command-box");
  if (!button) return;

  const command = button.dataset.command;

  try {
    await navigator.clipboard.writeText(command);

    const icon = button.querySelector(".copy-icon");
    const originalIcon = icon.textContent;

    icon.textContent = "✅";
    button.classList.add("copied");

    setTimeout(() => {
      icon.textContent = originalIcon;
      button.classList.remove("copied");
    }, 1200);
  } catch (error) {
    alert(`Copy this command: ${command}`);
  }
});

    loadRewards();
  </script>
</body>
</html>
